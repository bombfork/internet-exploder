[tools]
rust = "stable"
"cargo:cargo-binstall" = "latest"
"cargo:cargo-llvm-cov" = "latest"
hk = "latest"
pkl = "latest"

[tasks.fmt]
description = "Format code"
run = "cargo fmt --all"

[tasks."fmt:check"]
description = "Check code formatting"
run = "cargo fmt --all --check"

[tasks.lint]
description = "Run clippy and fix warnings"
run = "cargo clippy --workspace --fix --allow-dirty --allow-staged"

[tasks."lint:check"]
description = "Check for clippy warnings"
run = "cargo clippy --workspace -- -D warnings"

[tasks.build]
description = "Build the project"
run = "cargo build --workspace"

[tasks.test]
description = "Run tests"
run = "cargo test --workspace"

[tasks.coverage]
description = "Open HTML test coverage report"
run = "cargo llvm-cov --workspace --html --open"

[tasks."coverage:check"]
description = "Fail if test coverage drops below 75%"
run = "cargo llvm-cov --workspace --fail-under-lines 75"

[tasks."deps:update"]
description = "Update Rust dependencies"
run = "cargo upgrade --incompatible && cargo update"

[tasks.check]
description = "Run all checks (format, lint, build, test)"
depends = ["fmt:check", "lint:check", "build", "test"]

[tasks.run]
description = "Run the browser"
run = "cargo run -p ie-shell"
